<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ font_link }}">
  <style>
    :root {
      --primary: {{ colors.primary }};
      --bg: {{ colors.bg }};
      --accent: {{ colors.accent }};
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--primary);
      font-family: "{{ body_font }}", system-ui, sans-serif;
      line-height: 1.6;
    }
    main { max-width: 720px; margin: 0 auto; padding: 4rem 1.5rem; }
    h1 {
      font-family: "{{ heading_font }}", Georgia, serif;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      line-height: 1.1;
      margin: 0 0 .5rem;
    }
    .sub { font-size: 1.15rem; margin: 0 0 3rem; }
    section {
      border-top: 1px solid color-mix(in srgb, var(--primary) 18%, transparent);
      padding: 1.75rem 0;
    }
    section h2 {
      font-family: "{{ heading_font }}", Georgia, serif;
      font-size: 1.35rem;
      margin: 0 0 .4rem;
    }
    section p { margin: 0; }
    .cta {
      display: inline-block;
      margin-top: 2.5rem;
      padding: .85rem 1.6rem;
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
      font-weight: 600;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>{{ headline }}</h1>
    <p class="sub">{{ subhead }}</p>
    {% for s in sections %}
    <section id="{{ s.id }}">
      <h2>{{ s.title }}</h2>
      <p>{{ s.body }}</p>
    </section>
    {% endfor %}
    <a class="cta" href="{{ cta_href }}">{{ cta_text }}</a>
  </main>
</body>
</html>
